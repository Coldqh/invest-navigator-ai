server:
  port: 8080

spring:
  config:
    import:
      - optional:file:./local-secrets.yaml
      - optional:file:./backend/local-secrets.yaml

  application:
    name: invest-navigator-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/invest_navigator
    username: invest_user
    password: invest_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-root.yml

market-data:
  provider: HYBRID
  binance:
    base-url: https://api.binance.com
  moex:
    base-url: https://iss.moex.com

ai:
  provider: MOCK

  yandex-gpt:
    enabled: false
    base-url: https://ai.api.cloud.yandex.net/v1
    api-key: ""
    model: ""
    folder-id: ""
    timeout-seconds: 30

  giga-chat:
    enabled: false
    base-url: https://gigachat.devices.sberbank.ru/api/v1
    api-key: ${GIGA_CHAT_API_KEY:}
    model: ${GIGA_CHAT_MODEL:}
    folder-id: ""
    timeout-seconds: 30

  open-ai:
    enabled: false
    base-url: https://api.openai.com/v1
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:}
    folder-id: ""
    timeout-seconds: 30