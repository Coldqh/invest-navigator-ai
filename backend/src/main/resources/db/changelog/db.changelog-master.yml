  - changeSet:
      id: 006-create-ai-reports-table
      author: vlad
      changes:
        - createTable:
            tableName: ai_reports
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: asset_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: summary
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: risk_level
                  type: VARCHAR(32)
                  constraints:
                    nullable: false

              - column:
                  name: risk_score
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: confidence
                  type: DECIMAL(5, 2)
                  constraints:
                    nullable: false

              - column:
                  name: explanation
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: disclaimer
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: ai_reports
            baseColumnNames: asset_id
            constraintName: fk_ai_reports_asset
            referencedTableName: assets
            referencedColumnNames: id

        - createIndex:
            tableName: ai_reports
            indexName: idx_ai_reports_asset_id
            columns:
              - column:
                  name: asset_id

        - createIndex:
            tableName: ai_reports
            indexName: idx_ai_reports_created_at
            columns:
              - column:
                  name: created_at

  - changeSet:
      id: 007-create-ai-report-factor-tables
      author: vlad
      changes:
        - createTable:
            tableName: ai_report_positive_factors
            columns:
              - column:
                  name: report_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: factor_order
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: factor_text
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: ai_report_positive_factors
            baseColumnNames: report_id
            constraintName: fk_ai_report_positive_factors_report
            referencedTableName: ai_reports
            referencedColumnNames: id
            onDelete: CASCADE

        - createTable:
            tableName: ai_report_negative_factors
            columns:
              - column:
                  name: report_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: factor_order
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: factor_text
