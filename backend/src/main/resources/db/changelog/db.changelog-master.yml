                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: ai_report_negative_factors
            baseColumnNames: report_id
            constraintName: fk_ai_report_negative_factors_report
            referencedTableName: ai_reports
            referencedColumnNames: id
            onDelete: CASCADE