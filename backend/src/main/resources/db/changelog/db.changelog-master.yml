  - changeSet:
      id: 003-create-market-prices-table
      author: vlad
      changes:
        - createTable:
            tableName: market_prices
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: asset_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: price
                  type: DECIMAL(19, 6)
                  constraints:
                    nullable: false

              - column:
                  name: volume
                  type: DECIMAL(19, 6)
                  constraints:
                    nullable: false

              - column:
                  name: source
                  type: VARCHAR(64)
                  constraints:
                    nullable: false

              - column:
                  name: timestamp
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: market_prices
            baseColumnNames: asset_id
            constraintName: fk_market_prices_asset
            referencedTableName: assets
            referencedColumnNames: id

        - createIndex:
            tableName: market_prices
            indexName: idx_market_prices_asset_id
            columns:
              - column:
                  name: asset_id

        - createIndex:
            tableName: market_prices
            indexName: idx_market_prices_timestamp
            columns:
              - column:
                  name: timestamp

  - changeSet:
      id: 004-create-candles-table
      author: vlad
      changes:
        - createTable:
            tableName: candles
            columns:
              - column:
