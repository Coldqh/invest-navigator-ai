      id: 001-create-assets-table
      author: vlad
      changes:
        - createTable:
            tableName: assets
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: ticker
                  type: VARCHAR(32)
                  constraints:
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: asset_type
                  type: VARCHAR(32)
                  constraints:
                    nullable: false

              - column:
                  name: exchange
                  type: VARCHAR(64)
                  constraints:
                    nullable: false

              - column:
                  name: currency
                  type: VARCHAR(16)
                  constraints:
                    nullable: false

              - column:
                  name: isin
                  type: VARCHAR(32)

              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: assets
            columnNames: ticker, exchange
            constraintName: uk_assets_ticker_exchange

