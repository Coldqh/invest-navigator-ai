                  constraints:
                    nullable: false

              - column:
                  name: open
                  type: DECIMAL(19, 6)
                  constraints:
                    nullable: false

              - column:
                  name: high
                  type: DECIMAL(19, 6)
                  constraints:
                    nullable: false

              - column:
                  name: low
                  type: DECIMAL(19, 6)
                  constraints:
                    nullable: false

              - column:
                  name: close
                  type: DECIMAL(19, 6)
                  constraints:
                    nullable: false

              - column:
                  name: volume
                  type: DECIMAL(19, 6)
                  constraints:
                    nullable: false

              - column:
                  name: source
                  type: VARCHAR(64)
                  constraints:
                    nullable: false

              - column:
                  name: timestamp
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: candles
            baseColumnNames: asset_id
            constraintName: fk_candles_asset
            referencedTableName: assets
            referencedColumnNames: id

        - addUniqueConstraint:
            tableName: candles
            columnNames: asset_id, timeframe, timestamp
            constraintName: uk_candles_asset_timeframe_timestamp

        - createIndex:
            tableName: candles
            indexName: idx_candles_asset_id
            columns:
              - column:
                  name: asset_id

        - createIndex:
            tableName: candles
            indexName: idx_candles_timeframe
            columns:
              - column:
                  name: timeframe

        - createIndex:
            tableName: candles
            indexName: idx_candles_timestamp
            columns:
              - column:
                  name: timestamp

